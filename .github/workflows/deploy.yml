name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # หรือ master ถ้า repo คุณใช้ชื่อนั้น
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # สั่งติดตั้งและ Build ด้วย npm
      - name: Install and Build
        run: |
          npm install
          npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # AstroWind ปกติจะ build ลง folder นี้

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4